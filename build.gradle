plugins {
    id 'com.android.application' version '8.1.0' apply false
}

android {
    namespace 'org.example.mcscanner'
    compileSdk 34

    defaultConfig {
        applicationId "org.example.mcscanner"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
}
