<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MC Server Scanner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>MC Server Scanner</h1>

    <div class="input-group">
        <label>First IP (e.g. 0.0.0.0:25565)</label>
        <input type="text" id="firstIp" value="0.0.0.0:25565">
    </div>

    <div class="input-group">
        <label>IP Count</label>
        <input type="number" id="ipCount" value="1">
    </div>

    <div class="buttons">
        <button onclick="startScan()" id="startBtn" class="start">START SCAN</button>
        <button onclick="stopScan()" id="stopBtn" class="stop">STOP</button>
    </div>

    <button onclick="continueScan()" class="continue">Continue from last</button>

    <div class="status" id="status">Ready</div>

    <div class="tabs">
        <button onclick="showTab(0)" class="tab active" id="tab0btn">Log</button>
        <button onclick="showTab(1)" class="tab" id="tab1btn">Found Servers</button>
    </div>

    <div id="tab0" class="tab-content">
        <div id="log" class="log"></div>
    </div>

    <div id="tab1" class="tab-content" style="display:none;">
        <div id="found" class="found"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
