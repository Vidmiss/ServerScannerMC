<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MC Scanner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>MC Server Scanner</h1>

    <div class="input-group">
        <label>First IP (e.g. 156.16.0.0:25565)</label>
        <input type="text" id="firstIp" value="156.16.0.0:25565">
    </div>

    <div class="input-group">
        <label>IP Count</label>
        <input type="number" id="ipCount" value="300000">
    </div>

    <div class="buttons">
        <button onclick="startScan()" class="start">START SCAN</button>
        <button onclick="stopScan()" class="stop">STOP</button>
    </div>

    <button onclick="continueScan()" class="continue">Continue from last</button>

    <div class="status" id="status">Ready</div>

    <h2>Log</h2>
    <div id="log" class="log"></div>

    <h2>Found Servers (<span id="count">0</span>)</h2>
    <div id="found" class="found"></div>

    <script src="script.js"></script>
</body>
</html>
